<!doctype html>
<html lang="en">

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/images/projects/completed-home.webp" fetchpriority="high">

    <!-- Deferred Google Analytics (GA4) — loads after page render -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SZB5W1SDYQ');
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-SZB5W1SDYQ';
        document.head.appendChild(s);
      });
    </script>
    <title>Custom Home Builder Orlando FL | J&N StructureWorks</title>
    <meta name="description" content="Florida Certified Building Contractor (CBC1269175) serving Orlando & Central Florida. Custom homes, renovations, kitchen & bath remodels, and commercial buildouts in Orange, Seminole, Osceola & Lake counties. Call (321) 219-9007 for a free quote." />
    <link rel="manifest" href="/manifest.json" />
    <!-- All SEO tags (canonical, OG, Twitter, JSON-LD) managed by react-helmet-async per page -->
  </head>
  <body>
    <div id="root">
      <!-- Static hero shell — paints before React JS loads, eliminated by React on mount -->
      <div style="position:relative;min-height:90vh;display:flex;align-items:center;overflow:hidden">
        <div style="position:absolute;inset:0">
          <img src="/images/projects/completed-home.webp" alt="Custom home built by J&N StructureWorks in Central Florida" style="width:100%;height:100%;object-fit:cover" fetchpriority="high">
          <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(15,23,42,.95),rgba(15,23,42,.8),rgba(15,23,42,.4))"></div>
        </div>
        <div style="position:relative;z-index:10;max-width:80rem;margin:0 auto;padding:5rem 1.5rem">
          <h1 style="font-size:clamp(2.25rem,5vw,3.75rem);font-weight:700;color:#fff;line-height:1.1;margin:0">Custom Homes &amp;<br><span style="color:#f97316">Expert Renovations</span></h1>
          <p style="color:#cbd5e1;font-size:1.125rem;margin-top:1.5rem;max-width:42rem;line-height:1.6">We build custom homes, renovate older ones, and handle commercial buildouts across Central Florida. If you've got a project in mind, we'd love to talk about it.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
